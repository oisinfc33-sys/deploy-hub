<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeployHub Weather</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; }
        .card { background: #fff; border-radius: 16px; width: 100%; max-width: 420px; overflow: hidden; border: 1px solid #e8e8e5; }
        .main { padding: 24px; border-bottom: 1px solid #f0f0ee; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .date { font-size: 13px; color: #999; }
        .region-badge { font-size: 11px; color: #888; background: #f5f5f3; padding: 3px 10px; border-radius: 20px; border: 1px solid #e8e8e5; }
        .weather-row { display: flex; justify-content: space-between; align-items: flex-start; }
        .city-label { font-size: 13px; color: #999; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .country-flag { font-size: 20px; line-height: 1; }
        .temp { font-size: 56px; font-weight: 300; color: #1a1a1a; line-height: 1; }
        .condition { font-size: 14px; color: #999; margin-top: 6px; }
        .weather-icon { font-size: 56px; line-height: 1; transition: all 0.4s ease; }
        .search-bar { padding: 14px 20px; border-bottom: 1px solid #f0f0ee; display: flex; gap: 8px; }
        input { flex: 1; border: 1px solid #e8e8e5; border-radius: 8px; padding: 9px 14px; font-size: 14px; background: #fafaf8; color: #1a1a1a; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #999; background: #fff; }
        input::placeholder { color: #bbb; }
        button { background: #1a1a1a; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
        button:hover { background: #333; }
        .section { padding: 18px 24px; border-bottom: 1px solid #f0f0ee; }
        .section-label { font-size: 10px; color: #bbb; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .detail-item { background: #fafaf8; border-radius: 10px; padding: 12px 14px; }
        .detail-label { font-size: 11px; color: #bbb; margin-bottom: 4px; }
        .detail-value { font-size: 20px; font-weight: 400; color: #1a1a1a; }
        .history-list { display: flex; flex-direction: column; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f3; cursor: pointer; transition: background 0.15s; border-radius: 6px; padding: 10px 6px; }
        .history-item:hover { background: #fafaf8; }
        .history-item:last-child { border-bottom: none; }
        .h-left { display: flex; align-items: center; gap: 10px; }
        .h-flag { font-size: 22px; line-height: 1; }
        .h-city { font-size: 14px; font-weight: 500; color: #1a1a1a; }
        .h-desc { font-size: 12px; color: #bbb; margin-top: 2px; }
        .h-right { display: flex; align-items: center; gap: 10px; }
        .h-icon { font-size: 22px; }
        .h-temp { font-size: 22px; font-weight: 300; color: #1a1a1a; }
        .empty { font-size: 13px; color: #bbb; text-align: center; padding: 16px 0; }
        .error { font-size: 13px; color: #e05c5c; display: none; padding: 0 20px 14px; }
        .loading { font-size: 13px; color: #bbb; display: none; padding: 0 20px 10px; }
        .bg-transition { transition: background 0.8s ease; }
        .temp-cold { background: #eef4fb; }
        .temp-mild { background: #f0f7ee; }
        .temp-warm { background: #fdf6ee; }
        .temp-hot { background: #fdf0ee; }
    </style>
</head>
<body>
<div class="card bg-transition" id="main-card">
    <div class="main">
        <div class="top-row">
            <span class="date" id="today-date"></span>
            <span class="region-badge" id="region-badge">Earth</span>
        </div>
        <div class="weather-row">
            <div>
                <div class="city-label">
                    <span class="country-flag" id="main-flag"></span>
                    <span id="main-city">—</span>
                </div>
                <div class="temp" id="main-temp">—</div>
                <div class="condition" id="main-condition">Search a city to begin</div>
            </div>
            <div class="weather-icon" id="main-icon">🌍</div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="city-input" placeholder="Search a city..." />
        <button onclick="getWeather()">Search</button>
    </div>
    <div class="error" id="error-msg">City not found. Try again.</div>
    <div class="loading" id="loading-msg">Fetching weather...</div>

    <div class="section" id="details-section" style="display:none;">
        <div class="section-label">Details</div>
        <div class="details-grid">
            <div class="detail-item"><div class="detail-label">Feels like</div><div class="detail-value" id="feels-like">—</div></div>
            <div class="detail-item"><div class="detail-label">Humidity</div><div class="detail-value" id="humidity">—</div></div>
            <div class="detail-item"><div class="detail-label">Wind</div><div class="detail-value" id="wind">—</div></div>
            <div class="detail-item"><div class="detail-label">Visibility</div><div class="detail-value" id="visibility">—</div></div>
        </div>
    </div>

    <div class="section">
        <div class="section-label">Recent searches</div>
        <div class="history-list" id="history-list">
            <div class="empty">No searches yet</div>
        </div>
    </div>
</div>

function weatherIcon(desc) {
    desc = desc.toLowerCase();
    if (desc.includes('thunder')) return '⛈️';
    if (desc.includes('snow') || desc.includes('blizzard')) return '❄️';
    if (desc.includes('sleet') || desc.includes('freezing')) return '🌨️';
    if (desc.includes('heavy rain')) return '🌧️';
    if (desc.includes('drizzle') || desc.includes('light rain')) return '🌦️';
    if (desc.includes('rain')) return '🌧️';
    if (desc.includes('fog') || desc.includes('mist') || desc.includes('haze')) return '🌫️';
    if (desc.includes('sand') || desc.includes('dust')) return '🌪️';
    if (desc.includes('tornado') || desc.includes('squall')) return '🌪️';
    if (desc.includes('overcast')) return '☁️';
    if (desc.includes('broken clouds') || desc.includes('scattered')) return '🌥️';
    if (desc.includes('few clouds') || desc.includes('partly')) return '⛅';
    if (desc.includes('clear') || desc.includes('sunny')) return '☀️';
    if (desc.includes('cloud')) return '☁️';
    return '🌡️';
}

function tempBackground(temp) {
    if (temp <= 5) return 'temp-cold';
    if (temp <= 15) return 'temp-mild';
    if (temp <= 25) return 'temp-warm';
    return 'temp-hot';
}

const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const now = new Date();
document.getElementById('today-date').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

async function getWeather() {
    const city = document.getElementById('city-input').value.trim();
    const errEl = document.getElementById('error-msg');
    const loadEl = document.getElementById('loading-msg');
    errEl.style.display = 'none';
    if (!city) return;
    loadEl.style.display = 'block';
    try {
        const res = await fetch(`/weather?city=${encodeURIComponent(city)}`);
        const data = await res.json();
        loadEl.style.display = 'none';
        if (data.error) { errEl.style.display = 'block'; return; }

        const flag = countryFlags[data.country_code] || '🌍';
        const continent = continentMap[data.country_code] || 'Earth';
        const icon = weatherIcon(data.description);
        const temp = Math.round(data.temperature);

        document.getElementById('main-flag').textContent = flag;
        document.getElementById('main-city').textContent = data.city;
        document.getElementById('main-temp').textContent = `${temp}°`;
        document.getElementById('main-condition').textContent = data.description.charAt(0).toUpperCase() + data.description.slice(1);
        document.getElementById('main-icon').textContent = icon;
        document.getElementById('region-badge').textContent = continent;

        const card = document.getElementById('main-card');
        card.className = `card bg-transition ${tempBackground(temp)}`;

        document.getElementById('details-section').style.display = 'block';
        document.getElementById('feels-like').textContent = `${Math.round(data.feels_like)}°C`;
        document.getElementById('humidity').textContent = `${data.humidity}%`;
        document.getElementById('wind').textContent = `${Math.round(data.wind_speed)} km/h`;
        document.getElementById('visibility').textContent = data.visibility ? `${(data.visibility/1000).toFixed(1)} km` : '—';

        loadHistory();
    } catch(e) {
        loadEl.style.display = 'none';
        errEl.style.display = 'block';
    }
}

async function loadHistory() {
    const res = await fetch('/history');
    const data = await res.json();
    const list = document.getElementById('history-list');
    if (!data.length) { list.innerHTML = '<div class="empty">No searches yet</div>'; return; }
    list.innerHTML = data.map(item => {
        const flag = countryFlags[item.country_code] || '🌍';
        const icon = weatherIcon(item.description);
        return `
        <div class="history-item" onclick="searchCity('${item.city}')">
            <div class="h-left">
                <span class="h-flag">${flag}</span>
                <div>
                    <div class="h-city">${item.city}</div>
                    <div class="h-desc">${item.description.charAt(0).toUpperCase() + item.description.slice(1)}</div>
                </div>
            </div>
            <div class="h-right">
                <span class="h-icon">${icon}</span>
                <span class="h-temp">${Math.round(item.temperature)}°</span>
            </div>
        </div>`;
    }).join('');
}

function searchCity(city) {
    document.getElementById('city-input').value = city;
    getWeather();
}

document.getElementById('city-input').addEventListener('keypress', e => { if (e.key === 'Enter') getWeather(); });
loadHistory();

</html>
